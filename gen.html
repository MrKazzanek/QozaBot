<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Generator JSON SaaS</title>

<style>
:root{
  --bg:#0b1220;
  --card:#111a2e;
  --card2:#0f172a;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#22c55e;
  --danger:#ef4444;
  --border:rgba(255,255,255,0.08);
}

.light{
  --bg:#f1f5f9;
  --card:#ffffff;
  --card2:#e2e8f0;
  --text:#0f172a;
  --muted:#475569;
  --border:rgba(0,0,0,0.1);
}

*{box-sizing:border-box;font-family:Arial;}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:18px;
}

.container{
  width:100%;
  max-width:900px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
}

.title{
  font-size:18px;
  font-weight:700;
}

.btn{
  background:var(--accent);
  border:none;
  padding:10px 12px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-size:13px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card2);
  color:var(--text);
  outline:none;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.smallbtn{
  padding:8px 10px;
  font-size:12px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.green{background:var(--accent);color:#fff;}
.red{background:var(--danger);color:#fff;}
.gray{background:#334155;color:#fff;}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:8px;
  background:var(--card2);
}

.badge{
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  background:#334155;
}

.output{
  white-space:pre-wrap;
  font-size:12px;
  background:black;
  color:#00ff9d;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="title">⚙️ Generator JSON SaaS</div>
    <button class="btn" onclick="toggleTheme()">🎨 Theme</button>
  </div>

  <div class="grid">

    <div class="card">
      <h3>➕ Dodawanie</h3>

      <input id="haslo" placeholder="Hasło" />
      <input id="kategoria" placeholder="Kategoria" />
      <input id="maxProb" type="number" placeholder="Max prób" />
      <input id="maxLiter" type="number" placeholder="Max liter" />
      <input id="punkty" type="number" placeholder="Punkty" />

      <select id="trudnosc">
        <option value="easy">easy</option>
        <option value="medium">medium</option>
        <option value="hard">hard</option>
      </select>

      <label style="display:block;margin-top:10px;">
        <input type="checkbox" id="karaToggle" /> Kara
      </label>
      <input id="kara" type="number" style="display:none" placeholder="Kara" />

      <div class="row" style="margin-top:10px;">
        <button class="smallbtn green" onclick="saveItem()">➕ Zapisz</button>
        <button class="smallbtn gray" onclick="clearForm()">🧹 Reset</button>
      </div>
    </div>

    <div class="card">
      <h3>🔍 Lista</h3>

      <input id="search" placeholder="Szukaj..." oninput="render()" />

      <select id="filter" onchange="render()">
        <option value="">Wszystkie</option>
        <option value="easy">easy</option>
        <option value="medium">medium</option>
        <option value="hard">hard</option>
      </select>

      <div id="list"></div>
    </div>

  </div>

  <div class="card">
    <h3>📦 JSON</h3>

    <div class="row">
      <button class="smallbtn green" onclick="generate()">Generuj</button>
      <button class="smallbtn gray" onclick="copy()">Kopiuj</button>
      <button class="smallbtn gray" onclick="download()">Pobierz</button>
      <input type="file" onchange="importJSON(event)" />
    </div>

    <div class="output" id="out"></div>
  </div>

</div>

<script>
let items = JSON.parse(localStorage.getItem('items')||'[]');
let editId = null;

function saveLS(){ localStorage.setItem('items', JSON.stringify(items)); }

karaToggle.onchange=()=>kara.style.display=karaToggle.checked?'block':'none';

function saveItem(){
  const obj = {
    id: editId || Date.now(),
    haslo: haslo.value,
    kategoria: kategoria.value,
    maxProb: +maxProb.value,
    maxLiter: +maxLiter.value,
    punkty: +punkty.value,
    trudnosc: trudnosc.value
  };

  if(karaToggle.checked) obj.kara = +kara.value;

  const idx = items.findIndex(i=>i.id===obj.id);
  if(idx>-1) items[idx]=obj;
  else items.push(obj);

  editId=null;
  saveLS(); render(); clearForm();
}

function edit(id){
  const i = items.find(x=>x.id===id);
  if(!i) return;

  haslo.value=i.haslo;
  kategoria.value=i.kategoria;
  maxProb.value=i.maxProb;
  maxLiter.value=i.maxLiter;
  punkty.value=i.punkty;
  trudnosc.value=i.trudnosc;

  if(i.kara!=null){karaToggle.checked=true; kara.style.display='block'; kara.value=i.kara;}

  editId=id;
}

function del(id){
  items=items.filter(i=>i.id!==id);
  saveLS(); render();
}

function render(){
  const q = search.value.toLowerCase();
  const f = filter.value;

  let data = items.filter(i=>i.haslo.toLowerCase().includes(q));
  if(f) data=data.filter(i=>i.trudnosc===f);

  list.innerHTML='';

  data.forEach(i=>{
    list.innerHTML+=
      '<div class="item">' +
      '<div><b>'+i.haslo+'</b><div class="badge">'+i.trudnosc+'</div></div>' +
      '<div class="row">' +
      '<button class="smallbtn gray" onclick="edit('+i.id+')">✏️</button>' +
      '<button class="smallbtn red" onclick="del('+i.id+')">❌</button>' +
      '</div></div>';
  });
}

function clearForm(){
  document.querySelectorAll('input').forEach(i=>i.value='');
  karaToggle.checked=false;
  kara.style.display='none';
}

function generate(){ out.innerText=JSON.stringify(items,null,2); }
function copy(){ navigator.clipboard.writeText(out.innerText); }
function download(){
  const b=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='data.json';
  a.click();
}

function importJSON(e){
  const r=new FileReader();
  r.onload=()=>{items=JSON.parse(r.result);saveLS();render();};
  r.readAsText(e.target.files[0]);
}

function toggleTheme(){document.body.classList.toggle('light');}

render();
</script>

</body>
</html>
