<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator JSON</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #334155);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #1e293b;
  padding: 24px;
  border-radius: 20px;
  width: 100%;
  max-width: 450px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

h1 { margin-bottom: 16px; }

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  margin-top: 14px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover { background: #16a34a; }

.output {
  margin-top: 16px;
  background: #0f172a;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  white-space: pre-wrap;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Generator JSON</h1>

  <input id="haslo" placeholder="Hasło (np. Diamentowy miecz)">
  <input id="kategoria" placeholder="Kategoria">

  <input id="maxProb" type="number" placeholder="Max prób">
  <input id="punkty" type="number" placeholder="Punkty">

  <label>
    Trudność:
    <select id="trudnosc">
      <option value="easy">easy</option>
      <option value="medium">medium</option>
      <option value="hard">hard</option>
    </select>
  </label>

  <label>
    <input type="checkbox" id="karaToggle"> Dodaj karę
  </label>

  <input id="kara" type="number" placeholder="Kara" style="display:none;">

  <button onclick="generate()">Generuj JSON</button>

  <div class="output" id="output"></div>
</div>

<script>
const karaToggle = document.getElementById("karaToggle");
const karaInput = document.getElementById("kara");

karaToggle.addEventListener("change", () => {
  karaInput.style.display = karaToggle.checked ? "block" : "none";
});

function getUniqueLetters(text) {
  return [...new Set(text.replace(/\\s+/g, '').toLowerCase())];
}

function generate() {
  const haslo = document.getElementById("haslo").value;
  const kategoria = document.getElementById("kategoria").value;
  const maxProb = Number(document.getElementById("maxProb").value);
  const punkty = Number(document.getElementById("punkty").value);
  const trudnosc = document.getElementById("trudnosc").value;

  const uniqueLetters = getUniqueLetters(haslo);

  let obj = {
    haslo,
    kategoria,
    maxProb,
    maxLiter: uniqueLetters.length,
    punkty,
    trudnosc
  };

  if (karaToggle.checked) {
    obj.kara = Number(document.getElementById("kara").value);
  }

  document.getElementById("output").innerText = JSON.stringify([obj], null, 2);
}
</script>

</body>
</html>
