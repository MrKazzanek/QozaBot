<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator Haseł</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    body {
      background: linear-gradient(135deg, #0f172a, #334155);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 { font-size: 22px; margin-bottom: 12px; }
    .badge { font-size: 12px; opacity: 0.7; margin-bottom: 12px; }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #16a34a; }

    .info {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.8;
    }

    .letters {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .letter {
      background: #334155;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 14px;
    }

    .message {
      margin-top: 12px;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      .card { padding: 18px; }
      h1 { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="card">
  <h1 id="title"></h1>
  <div class="badge" id="meta"></div>

  <div class="letters" id="letters"></div>

  <input id="input" placeholder="Wpisz unikalne litery..." />
  <button onclick="check()">Sprawdź</button>

  <div class="info" id="limits"></div>
  <div class="message" id="message"></div>
</div>

<script>
const data = [
  {
    "haslo": "Diamentowy miecz",
    "kategoria": "Przedmioty",
    "maxProb": 10,
    "maxLiter": 11,
    "punkty": 10,
    "kara": 8,
    "trudnosc": "easy"
  }
];

let current = data[0];

function getUniqueLetters(text) {
  return [...new Set(text.replace(/\s+/g, '').toLowerCase())];
}

const uniqueLetters = getUniqueLetters(current.haslo);

// UI init

document.getElementById("title").innerText = current.haslo;
document.getElementById("meta").innerText = `${current.kategoria} • ${current.trudnosc}`;
document.getElementById("limits").innerText = `Max liter: ${uniqueLetters.length}`;

const lettersDiv = document.getElementById("letters");
uniqueLetters.forEach(l => {
  const el = document.createElement("div");
  el.className = "letter";
  el.innerText = l;
  lettersDiv.appendChild(el);
});

const input = document.getElementById("input");

input.addEventListener("input", (e) => {
  let value = e.target.value.toLowerCase();

  // limit długości
  if (value.length > uniqueLetters.length) {
    value = value.slice(0, uniqueLetters.length);
  }

  // usuwanie duplikatów
  let unique = [...new Set(value.split(''))];

  input.value = unique.join('');
});

function check() {
  const value = input.value;

  const correct = uniqueLetters.every(l => value.includes(l));

  if (correct) {
    document.getElementById("message").innerText = "✅ Wszystkie litery poprawne!";
  } else {
    document.getElementById("message").innerText = "❌ Brakuje liter";
  }
}
</script>

</body>
</html>
