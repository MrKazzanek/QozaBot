<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator JSON</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #334155);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #1e293b;
  padding: 24px;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

h1 { margin-bottom: 16px; }

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button:hover { background: #16a34a; }

.row {
  display: flex;
  gap: 8px;
}

.output {
  margin-top: 16px;
  background: #0f172a;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  white-space: pre-wrap;
}

.small {
  font-size: 13px;
  opacity: 0.8;
  margin-top: 6px;
}

.list {
  margin-top: 12px;
  font-size: 13px;
  max-height: 120px;
  overflow-y: auto;
}

.item {
  background: #334155;
  padding: 6px;
  border-radius: 6px;
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Generator JSON</h1>

  <input id="haslo" placeholder="Hasło">
  <button onclick="calcLetters()">Policz unikalne litery</button>
  <div class="small" id="lettersResult"></div>

  <input id="kategoria" placeholder="Kategoria">
  <input id="maxProb" type="number" placeholder="Max prób">
  <input id="maxLiter" type="number" placeholder="Max liter">
  <input id="punkty" type="number" placeholder="Punkty">

  <select id="trudnosc">
    <option value="easy">easy</option>
    <option value="medium">medium</option>
    <option value="hard">hard</option>
  </select>

  <label>
    <input type="checkbox" id="karaToggle"> Dodaj karę
  </label>

  <input id="kara" type="number" placeholder="Kara" style="display:none;">

  <button onclick="addItem()">➕ Dodaj do listy</button>

  <div class="list" id="list"></div>

  <button onclick="generate()">Generuj JSON</button>

  <div class="row">
    <button onclick="copyJSON()">📋 Kopiuj</button>
    <button onclick="downloadJSON()">💾 Pobierz</button>
  </div>

  <div class="output" id="output"></div>
</div>

<script>
let items = [];

const karaToggle = document.getElementById("karaToggle");
const karaInput = document.getElementById("kara");

karaToggle.addEventListener("change", () => {
  karaInput.style.display = karaToggle.checked ? "block" : "none";
});

function getUniqueLetters(text) {
  return [...new Set(text.replace(/\s+/g, '').toLowerCase())];
}

function calcLetters() {
  const haslo = document.getElementById("haslo").value;
  const letters = getUniqueLetters(haslo);

  document.getElementById("lettersResult").innerText =
    `Unikalne litery (${letters.length}): ${letters.join(', ')}`;
}

function addItem() {
  const haslo = document.getElementById("haslo").value;
  const kategoria = document.getElementById("kategoria").value;
  const maxProb = Number(document.getElementById("maxProb").value);
  const maxLiter = Number(document.getElementById("maxLiter").value);
  const punkty = Number(document.getElementById("punkty").value);
  const trudnosc = document.getElementById("trudnosc").value;

  let obj = { haslo, kategoria, maxProb, maxLiter, punkty, trudnosc };

  if (karaToggle.checked) {
    obj.kara = Number(document.getElementById("kara").value);
  }

  items.push(obj);
  renderList();
}

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = `${i+1}. ${item.haslo}`;
    list.appendChild(div);
  });
}

function generate() {
  document.getElementById("output").innerText = JSON.stringify(items, null, 2);
}

function copyJSON() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
}

function downloadJSON() {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "data.json";
  a.click();
}
</script>

</body>
</html>
