<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator JSON PRO</title>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #ffffff;
  --accent: #22c55e;
}

.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 600px;
  background: var(--card);
  padding: 20px;
  border-radius: 20px;
}

h1 { margin-bottom: 10px; }

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  cursor: pointer;
}

.row { display: flex; gap: 8px; flex-wrap: wrap; }

.list { margin-top: 10px; }

.item {
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.2);
  padding: 8px;
  border-radius: 10px;
  margin-top: 6px;
}

.output {
  margin-top: 10px;
  background: black;
  color: #00ff9d;
  padding: 10px;
  border-radius: 10px;
  font-size: 12px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">
  <h1>Generator JSON PRO</h1>

  <button onclick="toggleTheme()">🎨 Zmień motyw</button>

  <input id="search" placeholder="🔍 Szukaj hasła..." oninput="renderList()">

  <select id="sort" onchange="renderList()">
    <option value="">Sortowanie</option>
    <option value="easy">easy</option>
    <option value="medium">medium</option>
    <option value="hard">hard</option>
  </select>

  <input id="haslo" placeholder="Hasło">
  <input id="kategoria" placeholder="Kategoria">
  <input id="maxProb" type="number" placeholder="Max prób">
  <input id="maxLiter" type="number" placeholder="Max liter">
  <input id="punkty" type="number" placeholder="Punkty">

  <select id="trudnosc">
    <option value="easy">easy</option>
    <option value="medium">medium</option>
    <option value="hard">hard</option>
  </select>

  <label><input type="checkbox" id="karaToggle"> Kara</label>
  <input id="kara" type="number" placeholder="Kara" style="display:none;">

  <button onclick="addItem()">➕ Dodaj</button>

  <input type="file" onchange="importJSON(event)">

  <div class="list" id="list"></div>

  <button onclick="generate()">Generuj JSON</button>
  <button onclick="copyJSON()">📋 Kopiuj</button>
  <button onclick="downloadJSON()">💾 Pobierz</button>

  <div class="output" id="output"></div>
</div>

<script>
let items = JSON.parse(localStorage.getItem("items") || "[]");
let editIndex = null;

function save(){ localStorage.setItem("items", JSON.stringify(items)); }

karaToggle.onchange = ()=> kara.style.display = karaToggle.checked ? 'block':'none';

function addItem(){
  let obj = {
    haslo: haslo.value,
    kategoria: kategoria.value,
    maxProb: +maxProb.value,
    maxLiter: +maxLiter.value,
    punkty: +punkty.value,
    trudnosc: trudnosc.value
  };
  if(karaToggle.checked) obj.kara = +kara.value;

  if(editIndex!=null){ items[editIndex]=obj; editIndex=null; }
  else items.push(obj);

  save(); renderList();
}

function deleteItem(i){ items.splice(i,1); save(); renderList(); }
function editItem(i){ Object.assign(window, items[i]); editIndex=i; }

function renderList(){
  let q = search.value.toLowerCase();
  let s = sort.value;

  let filtered = items.filter(i => i.haslo.toLowerCase().includes(q));
  if(s) filtered = filtered.filter(i=>i.trudnosc===s);

  list.innerHTML='';
  filtered.forEach((item,i)=>{
    list.innerHTML += `<div class="item">
      <span>${item.haslo} (${item.trudnosc})</span>
      <div>
        <button onclick="editItem(${i})">✏️</button>
        <button onclick="deleteItem(${i})">❌</button>
      </div>
    </div>`;
  });
}

function generate(){ output.innerText = JSON.stringify(items,null,2); }
function copyJSON(){ navigator.clipboard.writeText(output.innerText); }

function downloadJSON(){
  let blob = new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='data.json'; a.click();
}

function importJSON(e){
  let file = e.target.files[0];
  let reader = new FileReader();
  reader.onload = () => {
    items = JSON.parse(reader.result);
    save(); renderList();
  };
  reader.readAsText(file);
}

function toggleTheme(){
  document.body.classList.toggle('light');
}

renderList();
</script>

</body>
</html>
